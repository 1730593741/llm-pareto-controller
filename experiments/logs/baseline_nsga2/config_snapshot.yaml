source_config_path: experiments/configs/baseline_nsga2.yaml
resolved_config:
  optimizer:
    population_size: 24
    generations: 20
    crossover_prob: 0.9
    mutation_prob: 0.1
    seed: 11
  controller:
    control_interval: 99999
    min_mutation_prob: 0.1
    max_mutation_prob: 0.1
    min_crossover_prob: 0.9
    max_crossover_prob: 0.9
    mutation_step: 0.0
    crossover_step: 0.0
    feasible_ratio_low: 0.0
    diversity_low: 0.0
    improvement_threshold: 1.0
  controller_mode:
    mode: rule
    experience_lookback: 1
  llm:
    provider: openai
    model: gpt-mock
    timeout_s: 10.0
    max_retries: 2
    api_key_env: OPENAI_API_KEY
    base_url_env: OPENAI_BASE_URL
    model_env: OPENAI_MODEL
    base_url: https://api.openai.com/v1/chat/completions
    fallback_mode: mock_llm
  problem:
    n_tasks: 6
    n_resources: 3
    cost_matrix:
    - - 3.0
      - 1.5
      - 2.0
    - - 2.8
      - 1.6
      - 1.9
    - - 2.0
      - 2.5
      - 1.2
    - - 1.4
      - 2.2
      - 2.6
    - - 2.1
      - 1.3
      - 2.4
    - - 1.9
      - 2.1
      - 1.7
    task_loads:
    - 1.0
    - 1.2
    - 1.4
    - 1.1
    - 0.9
    - 1.3
    capacities:
    - 2.8
    - 2.8
    - 2.8
  memory:
    enabled: false
    memory_window: 1
    experience_log_path: null
    reward_alpha: 1.0
    reward_beta: 0.1
  logging:
    output_dir: experiments/logs/baseline_nsga2
    events_file: events.jsonl
    experiences_file: experiences.jsonl
    summary_file: summary.json
    config_snapshot_file: config_snapshot.yaml
    generation_log_file: generation_metrics.jsonl
    action_log_file: actions.jsonl
  experiment:
    name: baseline_nsga2
    seed: 11
  log_path: null
