problem:
  problem_type: dwta
  munitions:
    - id: m_he
      max_range: 12.0
      flight_speed: 3.0
      lethality: 2.0
    - id: m_ap
      max_range: 9.0
      flight_speed: 4.0
      lethality: 1.5
  weapons:
    - id: w1
      x: 0.0
      y: 0.0
      munition_type_id: m_he
      ammo_capacity: 4
    - id: w2
      x: 2.0
      y: 1.0
      munition_type_id: m_ap
      ammo_capacity: 3
  targets:
    - id: t1
      x: 3.0
      y: 1.0
      required_damage: 4.0
      time_window: [0.0, 5.0]
    - id: t2
      x: 6.5
      y: 0.5
      required_damage: 3.5
      time_window: [0.0, 4.0]
    - id: t3
      x: 10.5
      y: 1.0
      required_damage: 2.5
      time_window: [0.0, 4.5]

optimizer:
  population_size: 24
  generations: 20
  crossover_prob: 0.9
  mutation_prob: 0.12
  repair_prob: 1.0
  seed: 42

controller:
  control_interval: 1
  min_mutation_prob: 0.02
  max_mutation_prob: 0.8
  min_crossover_prob: 0.4
  max_crossover_prob: 0.98
  mutation_step: 0.05
  crossover_step: 0.04
  feasible_ratio_low: 0.6
  diversity_low: 0.15
  improvement_threshold: 0.0001

controller_mode:
  mode: rule

memory:
  enabled: true
  memory_window: 100

logging:
  output_dir: experiments/logs/dwta_small

experiment:
  name: dwta_small
  method: llm_pareto_controller
  benchmark: dwta_small
