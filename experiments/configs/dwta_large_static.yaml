optimizer:
  # 大规模静态问题需要更高样本覆盖；96 保持多样性且在研究机上可承受。
  population_size: 96
  # 120 代用于给 controller 足够调参窗口，避免过早收敛。
  generations: 120
  crossover_prob: 0.9
  mutation_prob: 0.12
  repair_prob: 1.0
  eta_c: 20.0
  eta_m: 40.0
  local_search_prob: 0.1
  seed: 2026

controller:
  # 每 5 代控制一次：兼顾响应速度与 LLM 开销。
  control_interval: 5
  min_mutation_prob: 0.02
  max_mutation_prob: 0.8
  min_crossover_prob: 0.4
  max_crossover_prob: 0.98
  mutation_step: 0.05
  crossover_step: 0.04
  feasible_ratio_low: 0.65
  diversity_low: 0.14
  improvement_threshold: 0.0001

controller_mode:
  mode: rule

memory:
  enabled: true
  # 扩大到 200，覆盖更多控制上下文，适配 120 代长程实验。
  memory_window: 200

logging:
  output_dir: experiments/logs/dwta_large_static
