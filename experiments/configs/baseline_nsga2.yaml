experiment:
  name: baseline_nsga2
  seed: 11
problem:
  problem_type: dwta
  munition_types:
  - id: m_he
    max_range: 12.0
    flight_speed: 3.0
    lethality: 2.0
  - id: m_ap
    max_range: 9.0
    flight_speed: 4.0
    lethality: 1.5
  weapons:
  - id: w1
    x: 0.0
    y: 0.0
    munition_type_id: m_he
    ammo_capacity: 4
  - id: w2
    x: 2.0
    y: 1.0
    munition_type_id: m_ap
    ammo_capacity: 3
  targets:
  - id: t1
    x: 3.0
    y: 1.0
    required_damage: 4.0
    time_window:
    - 0.0
    - 5.0
  - id: t2
    x: 6.5
    y: 0.5
    required_damage: 3.5
    time_window:
    - 0.0
    - 4.0
  - id: t3
    x: 10.5
    y: 1.0
    required_damage: 2.5
    time_window:
    - 0.0
    - 4.5
solver:
  population_size: 24
  generations: 20
  crossover_prob: 0.9
  mutation_prob: 0.1
  repair_prob: 1.0
  eta_c: null
  eta_m: null
  local_search_prob: null
  seed: 11
controller:
  mode: rule
  experience_lookback: 1
  memory_enabled: false
  memory_window: 1
  reward_alpha: 1.0
  reward_beta: 0.1
  rule:
    control_interval: 99999
    min_mutation_prob: 0.1
    max_mutation_prob: 0.1
    min_crossover_prob: 0.9
    max_crossover_prob: 0.9
    mutation_step: 0.0
    crossover_step: 0.0
    feasible_ratio_low: 0.0
    diversity_low: 0.0
    improvement_threshold: 1.0
ablation:
  disabled_observations: []
  disable_history: true
  disabled_action_dimensions: []
logging:
  output_dir: experiments/logs/baseline_nsga2
  events_file: events.jsonl
  experiences_file: experiences.jsonl
  summary_file: summary.json
  config_snapshot_file: config_snapshot.yaml
  generation_log_file: generation_metrics.jsonl
  action_log_file: actions.jsonl
