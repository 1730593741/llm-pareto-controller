problem:
  n_tasks: 6
  n_resources: 3
  cost_matrix:
    - [3.0, 1.5, 2.0]
    - [2.8, 1.6, 1.9]
    - [2.0, 2.5, 1.2]
    - [1.4, 2.2, 2.6]
    - [2.1, 1.3, 2.4]
    - [1.9, 2.1, 1.7]
  task_loads: [1.0, 1.2, 1.4, 1.1, 0.9, 1.3]
  capacities: [2.8, 2.8, 2.8]

optimizer:
  population_size: 24
  generations: 12
  crossover_prob: 0.9
  mutation_prob: 0.1
  seed: 9

controller:
  control_interval: 3
  min_mutation_prob: 0.03
  max_mutation_prob: 0.75
  min_crossover_prob: 0.45
  max_crossover_prob: 0.98
  mutation_step: 0.05
  crossover_step: 0.04
  feasible_ratio_low: 0.6
  diversity_low: 0.12
  improvement_threshold: 0.0001

controller_mode:
  mode: mock_llm
  experience_lookback: 4

llm:
  provider: openai
  model: gpt-mock
  timeout_s: 8.0
  max_retries: 1
  api_key_env: OPENAI_API_KEY

log_path: runs/m6/mock_llm_events.jsonl

memory:
  enabled: true
  memory_window: 100
  experience_log_path: runs/m6/mock_llm_experiences.jsonl
  reward_alpha: 1.0
  reward_beta: 0.1
