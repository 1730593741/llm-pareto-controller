experiment:
  name: mock_llm_chain
  seed: 9
problem:
  problem_type: dwta
  munition_types:
  - id: m_he
    max_range: 12.0
    flight_speed: 3.0
    lethality: 2.0
  - id: m_ap
    max_range: 9.0
    flight_speed: 4.0
    lethality: 1.5
  weapons:
  - id: w1
    x: 0.0
    y: 0.0
    munition_type_id: m_he
    ammo_capacity: 4
  - id: w2
    x: 2.0
    y: 1.0
    munition_type_id: m_ap
    ammo_capacity: 3
  targets:
  - id: t1
    x: 3.0
    y: 1.0
    required_damage: 4.0
    time_window:
    - 0.0
    - 5.0
  - id: t2
    x: 6.5
    y: 0.5
    required_damage: 3.5
    time_window:
    - 0.0
    - 4.0
  - id: t3
    x: 10.5
    y: 1.0
    required_damage: 2.5
    time_window:
    - 0.0
    - 4.5
solver:
  population_size: 24
  generations: 12
  crossover_prob: 0.9
  mutation_prob: 0.1
  repair_prob: 1.0
  eta_c: null
  eta_m: null
  local_search_prob: null
  seed: 9
controller:
  mode: mock_llm
  experience_lookback: 4
  memory_enabled: true
  memory_window: 100
  reward_alpha: 1.0
  reward_beta: 0.1
  rule:
    control_interval: 3
    min_mutation_prob: 0.03
    max_mutation_prob: 0.75
    min_crossover_prob: 0.45
    max_crossover_prob: 0.98
    min_eta_c: 5.0
    max_eta_c: 40.0
    min_eta_m: 5.0
    max_eta_m: 80.0
    min_repair_prob: 0.0
    max_repair_prob: 1.0
    min_local_search_prob: 0.0
    max_local_search_prob: 0.2
    mutation_step: 0.05
    crossover_step: 0.04
    eta_c_step: 2.0
    eta_m_step: 4.0
    repair_step: 0.08
    local_search_step: 0.05
    feasible_ratio_low: 0.6
    diversity_low: 0.12
    improvement_threshold: 0.0001
ablation:
  disabled_observations: []
  disable_history: false
  disabled_action_dimensions: []
logging:
  output_dir: experiments/logs/mock_llm
  events_file: events.jsonl
  experiences_file: experiences.jsonl
  summary_file: summary.json
  config_snapshot_file: config_snapshot.yaml
  generation_log_file: generation_metrics.jsonl
  action_log_file: actions.jsonl
llm:
  provider: openai
  model: gpt-mock
  timeout_s: 8.0
  max_retries: 1
  api_key_env: OPENAI_API_KEY
  base_url_env: OPENAI_BASE_URL
  model_env: OPENAI_MODEL
  base_url: https://api.openai.com/v1/chat/completions
  fallback_mode: mock_llm
